# ============================================================================
# GOOGLE PLAY STORE LISTING
# ============================================================================
google_play:
  title: "ChemNOR - AI Chemistry Assistant"
  
  short_description: |
    Your Intelligent Chemistry Assistant, Powered by AI
  
  full_description: |
    🧪 Welcome to ChemNOR - The ultimate AI-powered chemistry companion!

    ChemNOR brings advanced chemistry tools and artificial intelligence to your fingertips. Search chemical compounds, analyze molecular structures, and chat with an AI chemist—all in one sleek, user-friendly application.

    ✨ KEY FEATURES:

    🔍 COMPOUND SEARCH
    Search chemical compounds by name or formula using natural language. Get instant access to detailed properties, molecular weights, chemical formulas, and PubChem images. Perfect for students, researchers, and chemistry enthusiasts.

    🤖 AI CHEMISTRY CHAT
    Chat with an AI assistant about any chemical compound or chemistry topic. Get context-aware answers powered by the ChemNOR and Gemini APIs. Ask questions, get explanations, and deepen your chemistry knowledge.

    🧪 ADVANCED CHEMISTRY TOOLS
    Use specialized chemistry tools including the 'chemist' function for deeper structural and property analysis. Analyze molecular properties and get insights into compound behavior.

    📜 CHAT HISTORY
    Save and revisit your chemistry discussions locally. Long-press entries to copy text or delete them. Build your personal chemistry knowledge base over time.

    ⚙️ CUSTOMIZABLE SETTINGS
    Configure API keys, adjust font sizes, and personalize your experience. All preferences are persisted across sessions, so your settings are always ready when you return.

    🎨 MODERN, RESPONSIVE UI
    Enjoy a beautiful interface with:
    • Stylish bottom navigation for easy access
    • Professional Markdown rendering
    • Mathematical formula support
    • Fully responsive design for any device

    💡 PERFECT FOR:
    • High school and university chemistry students
    • Chemistry teachers and educators
    • Research professionals and chemists
    • Chemistry enthusiasts and hobbyists

    🛠️ REQUIREMENTS:
    • Android 6.0 or higher
    • Stable internet connection
    • Google account for optional features

    🔐 PRIVACY & SECURITY:
    ChemNOR respects your privacy. API keys are stored securely on your device. Your chat history is stored locally and never shared without your consent.

    📞 SUPPORT:
    Have questions or feedback? Contact us through the app's settings or visit our repository.

    Start your chemistry journey with ChemNOR today! 🚀

  categories:
    - "Education"
    - "Science"
    - "Chemistry"

  keywords:

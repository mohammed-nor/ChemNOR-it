# ============================================================================
# STORE LISTING GUIDELINES
# ============================================================================
guidelines:
  description: |
    Before publishing:
    
    1. IMAGES:
       - Replace all image filenames with actual screenshot paths
       - Google Play: Screenshots should be 1080x1920px
       - Apple App Store: Screenshots should be 1290x2796px for iPhone
       - Include 2-5 screenshots minimum
    
    2. CONTACT INFORMATION:
       - Update all email addresses
       - Provide actual privacy policy URL
       - Provide actual support/website URL
    
    3. KEYWORDS:
       - Google Play: Up to 50 characters for main description
       - Apple App Store: Comma-separated, up to 100 characters
    
    4. PRICING:
       - Update price information if charging
       - Specify in-app purchase details if applicable
    
    5. CONTENT RATING:
       - Fill out content rating questionnaire for each store
       - Ensure app content matches rating
    
    6. RELEASE NOTES:
       - Update with each new version
       - Be clear and concise
       - Highlight new features and bug fixes
    
    7. TESTING:
       - Test all features before publishing
       - Ensure API keys work correctly
       - Check privacy policy compliance
    
    8. LOCALIZATION:
       - Translate keywords, descriptions, and screenshots
       - Test in different locales
